<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мини-Казино</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 16px;
            color: var(--tg-theme-text-color, #000000);
            background: var(--tg-theme-bg-color, #ffffff);
            user-select: none;
        }

        .container {
            max-width: 390px;
            margin: 0 auto;
        }

        /* Табы управления режимами */
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .tab-btn {
            flex: 1;
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            color: var(--tg-theme-text-color, #000000);
            border: none;
            padding: 10px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }

        .tab-btn.active {
            background: var(--tg-theme-button-color, #3390ec);
            color: var(--tg-theme-button-text-color, #ffffff);
        }

        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        /* Общие стили баланса */
        .balance {
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            padding: 16px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
        }

        .balance-amount {
            font-size: 24px;
            font-weight: bold;
            color: var(--tg-theme-button-color, #3390ec);
        }

        /* Стили вкладки кейсов */
        .cases-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .case-item {
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-radius: 10px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s;
            border: 2px solid transparent;
        }

        .case-item:hover {
            transform: scale(1.02);
        }

        .case-image {
            font-size: 40px;
            margin-bottom: 8px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .case-name {
            font-weight: bold;
            margin-bottom: 4px;
            font-size: 14px;
        }

        .case-price {
            color: var(--tg-theme-button-color, #3390ec);
            font-size: 13px;
        }

        /* Стили вкладки Апгрейда */
        .upgrade-zone {
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
        }

        .upgrade-slots {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-bottom: 15px;
        }

        .upgrade-slot {
            width: 70px;
            height: 70px;
            background: rgba(0, 0, 0, 0.05);
            border: 2px dashed var(--tg-theme-hint-color, #999999);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            position: relative;
        }

        .upgrade-slot.filled {
            border-style: solid;
            border-color: var(--tg-theme-button-color, #3390ec);
            background: rgba(0, 0, 0, 0.1);
        }

        .upgrade-chance {
            font-size: 18px;
            font-weight: bold;
            margin: 10px 0;
            color: var(--tg-theme-button-color, #3390ec);
        }

        /* Стили Инвентаря */
        .inventory {
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            padding: 16px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .inventory h3 {
            margin: 0 0 12px 0;
            text-align: center;
        }

        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        .inventory-item {
            background: rgba(0, 0, 0, 0.05);
            border-radius: 8px;
            padding: 8px;
            text-align: center;
            font-size: 28px;
            position: relative;
            cursor: pointer;
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid transparent;
        }

        .inventory-item.selected-for-upgrade {
            border-color: #ff9500;
            background: rgba(255, 149, 0, 0.1);
        }

        .inventory-item.rare { box-shadow: inset 0 0 8px rgba(255, 59, 48, 0.3); }
        .inventory-item.epic { box-shadow: inset 0 0 8px rgba(88, 86, 214, 0.3); }
        .inventory-item.legendary { box-shadow: inset 0 0 8px rgba(255, 149, 0, 0.5); }

        .inventory-item .sell-button {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            font-size: 9px;
            padding: 2px 0;
            border-radius: 0 0 6px 6px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .inventory-item:hover .sell-button {
            opacity: 1;
        }

        /* Кнопки действий */
        .action-button {
            width: 100%;
            background: var(--tg-theme-button-color, #3390ec);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        .action-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .credit-button {
            display: none;
            margin: 10px auto 0 auto;
            background: #ff3b30;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
        }

        /* Результаты */
        .result {
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
            text-align: center;
            font-weight: bold;
            display: none;
        }
        .win { color: #34c759; }
        .lose { color: #ff3b30; }
        .error { color: #ff3b30; text-align: center; margin-top: 10px; font-size: 14px; }

        /* Рулетка анимации кейсов */
        .case-opening-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .case-items-container {
            display: flex;
            width: 320px;
            height: 100px;
            position: relative;
            overflow: hidden;
            background: #1a1a1a;
            border-radius: 10px;
        }

        .case-items-wrapper {
            display: flex;
            position: absolute;
            left: 0;
        }

        .case-item-animation {
            min-width: 100px;
            height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            flex-shrink: 0;
        }

        .case-selector {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 100%;
            border: 3px solid #3390ec;
            box-sizing: border-box;
            pointer-events: none;
            z-index: 2;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Вкладки навигации -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('cases-page')">📦 Кейсы</button>
            <button class="tab-btn" onclick="switchTab('upgrade-page')">⚡ Апгрейд</button>
        </div>

        <!-- Общий баланс -->
        <div class="balance">
            <div>Ваш баланс:</div>
            <div class="balance-amount" id="globalBalance">10000 б.</div>
            <button class="credit-button" id="creditButton">Взять бонус (1000 б.)</button>
        </div>

        <!-- СТРАНИЦА 1: КЕЙСЫ -->
        <div id="cases-page" class="page active">
            <div class="cases-container">
                <div class="case-item" data-case="basic" data-price="100">
                    <div class="case-image">📦</div>
                    <div class="case-name">Базовый кейс</div>
                    <div class="case-price">100 б.</div>
                </div>
                <div class="case-item" data-case="premium" data-price="500">
                    <div class="case-image">💎</div>
                    <div class="case-name">Премиум кейс</div>
                    <div class="case-price">500 б.</div>
                </div>
                <div class="case-item" data-case="rare" data-price="1000">
                    <div class="case-image">⭐</div>
                    <div class="case-name">Редкий кейс</div>
                    <div class="case-price">1000 б.</div>
                </div>
                <div class="case-item" data-case="epic" data-price="2000">
                    <div class="case-image">🔥</div>
                    <div class="case-name">Эпический кейс</div>
                    <div class="case-price">2000 б.</div>
                </div>
            </div>
            <button class="action-button" id="openCaseButton" disabled>Выберите кейс</button>
        </div>

        <!-- СТРАНИЦА 2: АПГРЕЙД -->
        <div id="upgrade-page" class="page">
            <div class="upgrade-zone">
                <div class="upgrade-slots">
                    <div class="upgrade-slot" id="slot-input">❓</div>
                    <div style="font-size: 24px;">➡️</div>
                    <div class="upgrade-slot" id="slot-output">❓</div>
                </div>
                <div class="upgrade-chance" id="upgradeChance">Шанс: 0%</div>
                <div style="font-size: 12px; color: var(--tg-theme-hint-color);">Выберите предмет из инвентаря ниже для улучшения</div>
            </div>
            <button class="action-button" id="upgradeButton" disabled>Улучшить предмет</button>
        </div>

        <!-- ОБЩИЙ ИНВЕНТАРЬ ДЛЯ ОБЕИХ ВКЛАДОК -->
        <div class="inventory">
            <h3>Ваш Инвентарь</h3>
            <div class="inventory-grid" id="inventoryGrid"></div>
        </div>

        <div class="result" id="resultNotice"></div>
        <div class="error" id="errorNotice"></div>

        <!-- Экран анимации рулетки -->
        <div class="case-opening-animation" id="caseOpeningAnimation">
            <div class="case-items-container" id="caseItemsContainer"></div>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        let selectedCase = null;
        let inventory = [];
        let currentBalance = 10000;
        let upgradeIndex = null; // Индекс улучшаемого предмета в инвентаре

        // Универсальный пул предметов без редких ломающихся эмодзи (чистая классика)
        const ITEMS = [
            { id: 1, name: 'Бронза', emoji: '🟤', rarity: 'common', value: 40 },
            { id: 2, name: 'Серебро', emoji: '⚪', rarity: 'common', value: 80 },
            { id: 3, name: 'Золото', emoji: '🟡', rarity: 'rare', value: 180 },
            { id: 4, name: 'Алмаз', emoji: '🔷', rarity: 'rare', value: 450 },
            { id: 5, name: 'Рубин', emoji: '🔺', rarity: 'epic', value: 950 },
            { id: 6, name: 'Изумруд', emoji: '💚', rarity: 'epic', value: 1800 },
            { id: 7, name: 'Амулет', emoji: '🔮', rarity: 'legendary', value: 4000 },
            { id: 8, name: 'Корона', emoji: '👑', rarity: 'legendary', value: 9000 }
        ];

        const CASE_DROPS = {
            basic: [1, 2, 3],
            premium: [2, 3, 4],
            rare: [3, 4, 5],
            epic: [4, 5, 6, 7, 8]
        };

        // Инициализация WebApp
        if (tg) {
            tg.enableClosingConfirmation();
            tg.expand();
            
            // Загрузка локального сохранения (без схлопывания страницы!)
            if(localStorage.getItem('casino_balance')) currentBalance = parseInt(localStorage.getItem('casino_balance'));
            if(localStorage.getItem('casino_inventory')) {
                try { inventory = JSON.parse(localStorage.getItem('casino_inventory')); } catch(e) { inventory = []; }
            }
            updateBalance(currentBalance);
            updateInventory();
        }

        function switchTab(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            
            document.getElementById(pageId).classList.add('active');
            event.currentTarget.classList.add('active');
            
            // Сброс выбора апгрейда при смене вкладок
            resetUpgrade();
            updateInventory();
            document.getElementById('resultNotice').style.display = 'none';
        }

        function updateBalance(newBalance) {
            currentBalance = newBalance;
            localStorage.setItem('casino_balance', currentBalance);
            document.getElementById('globalBalance').textContent = currentBalance + ' б.';
            document.getElementById('creditButton').style.display = currentBalance <= 0 ? 'block' : 'none';
        }

        function updateInventory() {
            localStorage.setItem('casino_inventory', JSON.stringify(inventory));
            const grid = document.getElementById('inventoryGrid');
            grid.innerHTML = '';
            
            if (inventory.length === 0) {
                grid.innerHTML = '<div style="grid-column: 1 / -1; text-align: center; color: var(--tg-theme-hint-color,#999999);">Инвентарь пуст</div>';
                return;
            }
            
            inventory.forEach((item, index) => {
                const el = document.createElement('div');
                el.className = `inventory-item ${item.rarity}`;
                if(index === upgradeIndex) el.classList.add('selected-for-upgrade');
                el.textContent = item.emoji;
                
                // Кнопка быстрой продажи
                const sellBtn = document.createElement('div');
                sellBtn.className = 'sell-button';
                sellBtn.textContent = `${item.value}б.`;
                sellBtn.onclick = (e) => {
                    e.stopPropagation();
                    sellItem(index);
                };
                
                el.appendChild(sellBtn);
                
                // Логика нажатия на предмет
                el.onclick = () => {
                    // Если мы во вкладке Апгрейда — выбираем его для улучшения
                    if(document.getElementById('upgrade-page').classList.contains('active')) {
                        selectForUpgrade(index);
                    }
                };
                
                grid.appendChild(el);
            });
        }

        function sellItem(index) {
            if(index === upgradeIndex) resetUpgrade();
            const reward = inventory[index].value;
            inventory.splice(index, 1);
            updateInventory();
            updateBalance(currentBalance + reward);
            showNotice(`Предмет успешно продан за ${reward} б.!`, true);
        }

        /* --- ЛОГИКА КЕЙСОВ --- */
        document.querySelectorAll('.case-item').forEach(item => {
            item.addEventListener('click', function() {
                selectedCase = this.dataset.case;
                const price = this.dataset.price;
                document.getElementById('openCaseButton').disabled = false;
                document.getElementById('openCaseButton').textContent = `Открыть за ${price} б.`;
                
                document.querySelectorAll('.case-item').forEach(c => c.style.borderColor = 'transparent');
                this.style.borderColor = 'var(--tg-theme-button-color, #3390ec)';
            });
        });

        document.getElementById('openCaseButton').addEventListener('click', () => {
            if (!selectedCase) return;
            const price = selectedCase === 'basic' ? 100 : selectedCase === 'premium' ? 500 : selectedCase === 'rare' ? 1000 : 2000;
            
            if (currentBalance < price) {
                showNotice('Недостаточно баланса!', false);
                return;
            }
            
            document.getElementById('openCaseButton').disabled = true;
            
            // Выбираем случайный предмет из пула кейса
            const pool = CASE_DROPS[selectedCase];
            const rolledId = pool[Math.floor(Math.random() * pool.length)];
            const wonItem = ITEMS.find(i => i.id === rolledId);
            
            // Анимация рулетки
            const animContainer = document.getElementById('caseOpeningAnimation');
            const wrapperContainer = document.getElementById('caseItemsContainer');
            wrapperContainer.innerHTML = '<div class="case-items-wrapper" id="animWrapper"></div><div class="case-selector"></div>';
            const wrapper = document.getElementById('animWrapper');
            
            // Генерируем ленту предметов
            for (let i = 0; i < 30; i++) {
                const randItem = ITEMS[Math.floor(Math.random() * ITEMS.length)];
                const d = document.createElement('div');
                d.className = 'case-item-animation';
                d.textContent = i === 25 ? wonItem.emoji : randItem.emoji;
                wrapper.appendChild(d);
            }
            
            animContainer.style.display = 'flex';
            wrapper.style.transform = 'translateX(0px)';
            void wrapper.offsetWidth;
            
            wrapper.style.transition = 'transform 3.5s cubic-bezier(0.15, 0.85, 0.35, 1)';
            wrapper.style.transform = 'translateX(-2400px)'; // Сдвиг к 25-му элементу
            
            setTimeout(() => {
                animContainer.style.display = 'none';
                
                // Начисляем награду БЕЗ закрытия приложения
                updateBalance(currentBalance - price);
                inventory.push({...wonItem});
                updateInventory();
                
                showNotice(`Выпало: ${wonItem.name} (${wonItem.emoji})`, true);
                document.getElementById('openCaseButton').disabled = false;
            }, 3600);
        });

        /* --- ЛОГИКА АПГРЕЙДА --- */
        function selectForUpgrade(index) {
            upgradeIndex = index;
            const item = inventory[index];
            
            // Находим следующий по крутости предмет для улучшения
            const nextItem = ITEMS.find(i => i.id === item.id + 1);
            
            if(!nextItem) {
                showNotice('Этот предмет уже максимального уровня!', false);
                resetUpgrade();
                return;
            }
            
            document.getElementById('slot-input').textContent = item.emoji;
            document.getElementById('slot-output').textContent = nextItem.emoji;
            
            // Считаем шанс улучшения на основе стоимостей предметов
            let chance = Math.floor((item.value / nextItem.value) * 100);
            if (chance > 85) chance = 85; // Ограничение максимального шанса
            
            document.getElementById('upgradeChance').textContent = `Шанс успеха: ${chance}%`;
            
            const upBtn = document.getElementById('upgradeButton');
            upBtn.disabled = false;
            upBtn.textContent = `Апгрейд за ${item.emoji} ➡️ ${nextItem.emoji}`;
            
            updateInventory();
        }

        function resetUpgrade() {
            upgradeIndex = null;
            document.getElementById('slot-input').textContent = '❓';
            document.getElementById('slot-output').textContent = '❓';
            document.getElementById('upgradeChance').textContent = 'Шанс: 0%';
            document.getElementById('upgradeButton').disabled = true;
            document.getElementById('upgradeButton').textContent = 'Улучшить предмет';
        }

        document.getElementById('upgradeButton').addEventListener('click', () => {
            if (upgradeIndex === null) return;
            
            const item = inventory[upgradeIndex];
            const nextItem = ITEMS.find(i => i.id === item.id + 1);
            let chance = Math.floor((item.value / nextItem.value) * 100);
            if (chance > 85) chance = 85;

            const roll = Math.random() * 100;
            
            if (roll <= chance) {
                // Успех! Заменяем старый предмет на новый
                inventory[upgradeIndex] = {...nextItem};
                showNotice(`Ура! Успешный апгрейд в ${nextItem.name} (${nextItem.emoji})!`, true);
            } else {
                // Провал... Уничтожаем вещь
                inventory.splice(upgradeIndex, 1);
                showNotice(`Увы, предмет сломался при улучшении.`, false);
            }
            
            resetUpgrade();
            updateInventory();
        });

        /* --- ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ --- */
        function showNotice(msg, isWin) {
            const el = document.getElementById('resultNotice');
            el.textContent = msg;
            el.className = `result ${isWin ? 'win' : 'lose'}`;
            el.style.display = 'block';
        }

        document.getElementById('creditButton').addEventListener('click', () => {
            if(currentBalance <= 0) {
                updateBalance(1000);
                resetUpgrade();
                updateInventory();
                showNotice('Вам начислен антикризисный бонус 1000 б.!', true);
            }
        });
    </script>
</body>
</html>
