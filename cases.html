<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кейсы</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 16px;
            color: var(--tg-theme-text-color);
            background: var(--tg-theme-bg-color);
        }

        .container {
            max-width: 390px;
            margin: 0 auto;
        }

        .balance {
            background: var(--tg-theme-secondary-bg-color);
            padding: 16px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
        }

        .balance-amount {
            font-size: 24px;
            font-weight: bold;
            color: var(--tg-theme-button-color);
        }

        .cases-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .case-item {
            background: var(--tg-theme-secondary-bg-color);
            border-radius: 10px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .case-item:hover {
            transform: scale(1.03);
        }

        .case-image {
            width: 100%;
            height: 100px;
            object-fit: contain;
            margin-bottom: 8px;
            font-size: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .case-name {
            font-weight: bold;
            margin-bottom: 4px;
        }

        .case-price {
            color: var(--tg-theme-button-color);
            font-size: 14px;
        }

        .inventory {
            background: var(--tg-theme-secondary-bg-color);
            padding: 16px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .inventory h3 {
            margin: 0 0 12px 0;
            text-align: center;
        }

        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .inventory-item {
            background: rgba(0, 0, 0, 0.1);
            border-radius: 6px;
            padding: 8px;
            text-align: center;
            font-size: 24px;
            position: relative;
            cursor: pointer;
            min-height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .inventory-item.rare { color: #ff3b30; }
        .inventory-item.epic { color: #5856d6; }
        .inventory-item.legendary { color: #ff9500; }

        .inventory-item .sell-button {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            font-size: 10px;
            padding: 2px;
            border-radius: 0 0 6px 6px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .inventory-item:hover .sell-button {
            opacity: 1;
        }

        .open-case-button {
            width: 100%;
            background: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 12px;
        }

        .open-case-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .result {
            background: var(--tg-theme-secondary-bg-color);
            padding: 16px;
            border-radius: 10px;
            margin-top: 20px;
            text-align: center;
            font-size: 16px;
            display: none;
        }

        .win { color: #34c759; font-weight: bold; }
        .lose { color: #ff3b30; }
        .error { color: #ff3b30; text-align: center; margin-top: 10px; font-size: 14px; }

        .debug {
            background: var(--tg-theme-secondary-bg-color);
            padding: 16px;
            border-radius: 10px;
            margin-top: 20px;
            font-size: 12px;
            font-family: monospace;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .credit-button {
            display: none;
            margin: 10px auto 0 auto;
            background: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
        }

        .case-opening-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .case-items-container {
            display: flex;
            width: 330px;
            height: 100px;
            position: relative;
            overflow: hidden;
        }

        .case-item-animation {
            min-width: 100px;
            height: 100px;
            background: var(--tg-theme-secondary-bg-color);
            margin: 0 5px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            flex-shrink: 0;
            position: relative;
        }

        .case-item-animation .item-price {
            position: absolute;
            bottom: 5px;
            font-size: 12px;
            color: white;
            background: rgba(0, 0, 0, 0.5);
            padding: 2px 6px;
            border-radius: 4px;
            white-space: nowrap;
        }

        .case-item-animation.rare .item-price { color: #ff3b30; }
        .case-item-animation.epic .item-price { color: #5856d6; }
        .case-item-animation.legendary .item-price { color: #ff9500; }

        .case-items-wrapper {
            display: flex;
            position: absolute;
            left: 0;
            transition: transform 0s linear;
        }

        .case-selector {
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 110px;
            transform: translateX(-50%);
            border: 2px solid var(--tg-theme-button-color);
            border-radius: 8px;
            pointer-events: none;
            z-index: 1;
        }

        .case-opening-result {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--tg-theme-secondary-bg-color);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            font-size: 24px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="balance">
            <div>Ваш баланс:</div>
            <div class="balance-amount">10000 монет</div>
            <button class="credit-button" id="creditButton">Взять кредит (1000 монет)</button>
        </div>

        <div class="cases-container">
            <div class="case-item" data-case="basic" data-price="100">
                <div class="case-image">📦</div>
                <div class="case-name">Базовый кейс</div>
                <div class="case-price">100 монет</div>
            </div>
            <div class="case-item" data-case="premium" data-price="500">
                <div class="case-image">💎</div>
                <div class="case-name">Премиум кейс</div>
                <div class="case-price">500 монет</div>
            </div>
            <div class="case-item" data-case="rare" data-price="1000">
                <div class="case-image">🌟</div>
                <div class="case-name">Редкий кейс</div>
                <div class="case-price">1000 монет</div>
            </div>
            <div class="case-item" data-case="epic" data-price="2000">
                <div class="case-image">🔥</div>
                <div class="case-name">Эпический кейс</div>
                <div class="case-price">2000 монет</div>
            </div>
        </div>

        <div class="inventory">
            <h3>Инвентарь</h3>
            <div class="inventory-grid" id="inventoryGrid">
                <div style="grid-column: 1 / -1; text-align: center; color: var(--tg-theme-hint-color);">Инвентарь пуст</div>
            </div>
        </div>

        <button class="open-case-button" id="openCaseButton" disabled>Выберите кейс</button>

        <div class="result" id="result"></div>
        <div class="error" id="error"></div>
        <div class="debug" id="debug"></div>

        <div class="case-opening-animation" id="caseOpeningAnimation">
            <div class="case-items-container" id="caseItemsContainer"></div>
            <div class="case-opening-result" id="caseOpeningResult"></div>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        let selectedCase = null;
        let inventory = [];
        let currentBalance = 10000;

        if (!tg) {
            showError('Ошибка инициализации Telegram WebApp');
        } else {
            tg.enableClosingConfirmation();
            tg.expand();
            
            showDebug('Telegram WebApp запущен. Готов к игре.');
            
            // Подтягиваем цвета темы Telegram
            document.documentElement.style.setProperty('--tg-theme-bg-color', tg.backgroundColor || '#ffffff');
            document.documentElement.style.setProperty('--tg-theme-text-color', tg.textColor || '#000000');
            document.documentElement.style.setProperty('--tg-theme-button-color', tg.buttonColor || '#3390ec');
            document.documentElement.style.setProperty('--tg-theme-button-text-color', tg.buttonTextColor || '#ffffff');
            document.documentElement.style.setProperty('--tg-theme-secondary-bg-color', tg.secondaryBackgroundColor || '#f0f0f0');
            document.documentElement.style.setProperty('--tg-theme-hint-color', tg.hintColor || '#999999');
            
            // Загружаем сохраненный локально баланс, чтобы он не сбрасывался при перезапуске окна
            if(localStorage.getItem('casino_balance')) {
                currentBalance = parseInt(localStorage.getItem('casino_balance'));
            }
            if(localStorage.getItem('casino_inventory')) {
                try {
                    inventory = JSON.parse(localStorage.getItem('casino_inventory'));
                } catch(e) { inventory = []; }
            }
            
            updateBalance(currentBalance);
            updateInventory(inventory);
        }

        const ITEMS = {
            basic: [
                { name: 'Маленькая монета', emoji: '🪙', rarity: 'common', value: 50 },
                { name: 'Средняя монета', emoji: '🪙', rarity: 'common', value: 75 },
                { name: 'Обычная монета', emoji: '🪙', rarity: 'common', value: 100 },
                { name: 'Мешок монет', emoji: '💰', rarity: 'rare', value: 150 },
                { name: 'Сундук монет', emoji: '💰', rarity: 'rare', value: 200 },
                { name: 'Кристалл', emoji: '💎', rarity: 'epic', value: 300 },
                { name: 'Звезда', emoji: '⭐', rarity: 'legendary', value: 500 }
            ],
            premium: [
                { name: 'Горсть монет', emoji: '🪙', rarity: 'common', value: 300 },
                { name: 'Мешочек монет', emoji: '🪙', rarity: 'common', value: 400 },
                { name: 'Мешок монет', emoji: '💰', rarity: 'rare', value: 500 },
                { name: 'Большой мешок', emoji: '💰', rarity: 'rare', value: 600 },
                { name: 'Сундук золото', emoji: '💎', rarity: 'epic', value: 800 },
                { name: 'Алмазный слиток', emoji: '💎', rarity: 'epic', value: 1000 },
                { name: 'Золотая звезда', emoji: '⭐', rarity: 'legendary', value: 1500 }
            ],
            rare: [
                { name: 'Мешок серебра', emoji: '🪙', rarity: 'common', value: 600 },
                { name: 'Мешок золота', emoji: '💰', rarity: 'common', value: 800 },
                { name: 'Сундук монет', emoji: '💰', rarity: 'rare', value: 1000 },
                { name: 'Сундук золота', emoji: '💰', rarity: 'rare', value: 1200 },
                { name: 'Алмазный куб', emoji: '💎', rarity: 'epic', value: 1500 },
                { name: 'Магический кристалл', emoji: '💎', rarity: 'epic', value: 2000 },
                { name: 'Платиновая звезда', emoji: '⭐', rarity: 'legendary', value: 3000 }
            ],
            epic: [
                { name: 'Сундук серебра', emoji: '💰', rarity: 'common', value: 1200 },
                { name: 'Сундук золота', emoji: '💰', rarity: 'common', value: 1600 },
                { name: 'Алмазный осколок', emoji: '💎', rarity: 'rare', value: 2000 },
                { name: 'Алмазный кристалл', emoji: '💎', rarity: 'rare', value: 2500 },
                { name: 'Магический алмаз', emoji: '💎', rarity: 'epic', value: 3000 },
                { name: 'Звёздный алмаз', emoji: '⭐', rarity: 'epic', value: 4000 },
                { name: 'Космическая звезда', emoji: '🌟', rarity: 'legendary', value: 6000 }
            ]
        };

        const RARITY_CHANCES = { common: 0.50, rare: 0.30, epic: 0.15, legendary: 0.05 };

        function showError(message) {
            document.getElementById('error').textContent = message;
            setTimeout(() => { document.getElementById('error').textContent = ''; }, 3000);
        }

        function showDebug(message) {
            document.getElementById('debug').textContent = message;
        }

        function showResult(message, isWin) {
            const resultElement = document.getElementById('result');
            resultElement.textContent = message;
            resultElement.className = isWin ? 'result win' : 'result lose';
            resultElement.style.display = 'block';
        }

        function updateBalance(newBalance) {
            currentBalance = newBalance;
            localStorage.setItem('casino_balance', currentBalance);
            
            const balanceElement = document.querySelector('.balance-amount');
            balanceElement.textContent = currentBalance + ' монет';
            
            const creditButton = document.getElementById('creditButton');
            if (currentBalance <= 0) {
                creditButton.style.display = 'block';
            } else {
                creditButton.style.display = 'none';
            }
        }

        function updateInventory(newInventory) {
            inventory = newInventory;
            localStorage.setItem('casino_inventory', JSON.stringify(inventory));
            
            const inventoryGrid = document.getElementById('inventoryGrid');
            inventoryGrid.innerHTML = '';
            
            if (inventory.length === 0) {
                inventoryGrid.innerHTML = '<div style="grid-column: 1 / -1; text-align: center; color: var(--tg-theme-hint-color);">Инвентарь пуст</div>';
                return;
            }
            
            inventory.forEach((item, index) => {
                const itemElement = document.createElement('div');
                itemElement.className = 'inventory-item ' + item.rarity;
                itemElement.textContent = item.emoji;
                itemElement.title = `${item.name} (${item.value} монет)`;
                
                const sellButton = document.createElement('div');
                sellButton.className = 'sell-button';
                sellButton.textContent = 'Продать';
                sellButton.onclick = (e) => {
                    e.stopPropagation();
                    sellItem(index);
                };
                
                itemElement.appendChild(sellButton);
                inventoryGrid.appendChild(itemElement);
            });
        }

        function sellItem(index) {
            const item = inventory[index];
            const reward = item.value;
            
            inventory.splice(index, 1);
            updateInventory(inventory);
            updateBalance(currentBalance + reward);
            
            showResult(`Вы продали ${item.name} за ${reward} монет!`, true);
            
            // Уведомляем бота в чате (не закрывая окно)
            try {
                tg.sendData(JSON.stringify({ action: 'update_data', balance: currentBalance, inventory: inventory, item_sold: item }));
            } catch(e){}
        }

        function selectCase(caseType) {
            selectedCase = caseType;
            const openCaseButton = document.getElementById('openCaseButton');
            openCaseButton.disabled = false;
            openCaseButton.textContent = `Открыть ${getCaseName(caseType)} (${getCasePrice(caseType)} монет)`;
            
            document.querySelectorAll('.case-item').forEach(item => {
                if (item.dataset.case === caseType) {
                    item.style.border = '2px solid var(--tg-theme-button-color)';
                } else {
                    item.style.border = 'none';
                }
            });
        }

        function getCaseName(caseType) {
            switch (caseType) {
                case 'basic': return 'Базовый кейс';
                case 'premium': return 'Премиум кейс';
                case 'rare': return 'Редкий кейс';
                case 'epic': return 'Эпический кейс';
                default: return 'Кейс';
            }
        }

        function getCasePrice(caseType) {
            switch (caseType) {
                case 'basic': return 100;
                case 'premium': return 500;
                case 'rare': return 1000;
                case 'epic': return 2000;
                default: return 0;
            }
        }

        function openCase() {
            if (!selectedCase) return;
            
            const casePrice = getCasePrice(selectedCase);
            if (currentBalance < casePrice) {
                showError('Недостаточно средств!');
                return;
            }
            
            document.getElementById('result').style.display = 'none';
            document.getElementById('openCaseButton').disabled = true;
            
            const item = getRandomItem(selectedCase);
            
            showCaseOpeningAnimation(item, () => {
                const newBalance = currentBalance - casePrice;
                inventory.push({...item});
                
                updateBalance(newBalance);
                updateInventory(inventory);
                
                showResult(`Вы получили: ${item.name}`, true);
                
                try {
                    tg.sendData(JSON.stringify({
                        action: 'update_data',
                        balance: newBalance,
                        inventory: inventory,
                        won_item: item
                    }));
                } catch (e) {}
                
                document.getElementById('openCaseButton').disabled = false;
            });
        }

        function getRandomItem(caseType) {
            const items = ITEMS[caseType];
            const rarityRoll = Math.random();
            let selectedRarity;
            
            if (rarityRoll < RARITY_CHANCES.legendary) selectedRarity = 'legendary';
            else if (rarityRoll < RARITY_CHANCES.legendary + RARITY_CHANCES.epic) selectedRarity = 'epic';
            else if (rarityRoll < RARITY_CHANCES.legendary + RARITY_CHANCES.epic + RARITY_CHANCES.rare) selectedRarity = 'rare';
            else selectedRarity = 'common';
            
            const rarityItems = items.filter(item => item.rarity === selectedRarity);
            return rarityItems[Math.floor(Math.random() * rarityItems.length)];
        }

        function showCaseOpeningAnimation(item, callback) {
            const animationContainer = document.getElementById('caseOpeningAnimation');
            const itemsContainer = document.getElementById('caseItemsContainer');
            
            itemsContainer.innerHTML = '';
            
            const itemsWrapper = document.createElement('div');
            itemsWrapper.className = 'case-items-wrapper';
            itemsContainer.appendChild(itemsWrapper);
            
            const selector = document.createElement('div');
            selector.className = 'case-selector';
            itemsContainer.appendChild(selector);
            
            const animationItems = [];
            const possibleItems = [];
            
            Object.values(ITEMS).forEach(caseItems => {
                caseItems.forEach(caseItem => {
                    if (!possibleItems.some(ex => ex.emoji === caseItem.emoji)) {
                        possibleItems.push({...caseItem});
                    }
                });
            });
            
            for (let i = 0; i < 40; i++) {
                animationItems.push({...possibleItems[Math.floor(Math.random() * possibleItems.length)]});
            }
            
            animationItems[35] = {...item}; 
            
            animationItems.forEach(animItem => {
                const itemElement = document.createElement('div');
                itemElement.className = 'case-item-animation ' + animItem.rarity;
                
                const em = document.createElement('div');
                em.textContent = animItem.emoji;
                itemElement.appendChild(em);
                
                const pr = document.createElement('div');
                pr.className = 'item-price';
                pr.textContent = animItem.value + ' 💰';
                itemElement.appendChild(pr);
                
                itemsWrapper.appendChild(itemElement);
            });
            
            animationContainer.style.display = 'flex';
            itemsWrapper.style.transform = 'translateX(0px)';
            
            void itemsWrapper.offsetWidth;
            
            setTimeout(() => {
                itemsWrapper.style.transition = 'transform 4s cubic-bezier(0.1, 0.5, 0.1, 1)';
                const finalPosition = -(35 * 110) + 110;
                itemsWrapper.style.transform = `translateX(${finalPosition}px)`;
                
                setTimeout(() => {
                    setTimeout(() => {
                        animationContainer.style.display = 'none';
                        if (callback) callback();
                    }, 1500);
                }, 4000);
            }, 50);
        }

        document.querySelectorAll('.case-item').forEach(item => {
            item.addEventListener('click', function() { selectCase(this.dataset.case); });
        });

        document.getElementById('openCaseButton').addEventListener('click', openCase);

        document.getElementById('creditButton').addEventListener('click', function() {
            if (currentBalance <= 0) {
                updateBalance(currentBalance + 1000);
                showResult('Вы взяли кредит в 1000 монет', true);
                try {
                    tg.sendData(JSON.stringify({ action: 'update_balance', balance: currentBalance, credit_taken: true }));
                } catch (e) {}
            }
        });
    </script>
</body>
</html>
