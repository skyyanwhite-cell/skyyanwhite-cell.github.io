<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мини-Казино</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 16px;
            color: var(--tg-theme-text-color, #000000);
            background: var(--tg-theme-bg-color, #ffffff);
            user-select: none;
        }

        .container {
            max-width: 390px;
            margin: 0 auto;
        }

        /* Табы управления режимами */
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .tab-btn {
            flex: 1;
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            color: var(--tg-theme-text-color, #000000);
            border: none;
            padding: 10px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }

        .tab-btn.active {
            background: var(--tg-theme-button-color, #3390ec);
            color: var(--tg-theme-button-text-color, #ffffff);
        }

        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        /* Общие стили баланса */
        .balance {
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            padding: 16px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
        }

        .balance-amount {
            font-size: 24px;
            font-weight: bold;
            color: var(--tg-theme-button-color, #3390ec);
        }

        /* Стили вкладки кейсов */
        .cases-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .case-item {
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-radius: 10px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s;
            border: 2px solid transparent;
        }

        .case-item:hover {
            transform: scale(1.02);
        }

        .case-image {
            font-size: 40px;
            margin-bottom: 8px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .case-name {
            font-weight: bold;
            margin-bottom: 4px;
            font-size: 14px;
        }

        .case-price {
            color: var(--tg-theme-button-color, #3390ec);
            font-size: 13px;
        }

        /* Стили вкладки Апгрейда */
        .upgrade-zone {
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
        }

        .upgrade-slots {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-bottom: 15px;
        }

        .upgrade-slot {
            width: 70px;
            height: 70px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            position: relative;
            background: #ffffff;
            border: 2px solid rgba(0,0,0,0.1);
        }

        .upgrade-prices {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            margin: 10px 0;
            color: var(--tg-theme-text-color, #000000);
            padding: 0 10px;
        }

        /* Горизонтальная шкала редкостей */
        .rarity-timeline {
            display: flex;
            justify-content: space-between;
            background: rgba(0,0,0,0.05);
            padding: 6px;
            border-radius: 20px;
            margin: 15px 0;
            gap: 4px;
        }

        .timeline-step {
            flex: 1;
            font-size: 10px;
            padding: 4px 2px;
            border-radius: 12px;
            color: #777;
            font-weight: bold;
            text-align: center;
            background: transparent;
            border: 1px solid transparent;
        }

        /* Активные состояния подсветок на шкале и предметах */
        .q-common { background: #ffffff !important; border-color: #ccc; color: #333; }
        .q-uncommon { background: #e2fcd4 !important; border-color: #34c759; color: #248a3d; box-shadow: 0 0 8px rgba(52,199,89,0.2); }
        .q-rare { background: #d4e2fc !important; border-color: #007aff; color: #0056b3; box-shadow: 0 0 8px rgba(0,122,255,0.2); }
        .q-epic { background: #f3d4fc !important; border-color: #af52de; color: #7b399c; box-shadow: 0 0 8px rgba(175,82,222,0.2); }
        .q-legendary { 
            background: #ffe9d4 !important; 
            border-color: #ff9500; 
            color: #b36b00;
            animation: pulse-orange 2s infinite ease-in-out;
        }

        .timeline-step.active {
            transform: scale(1.05);
            box-shadow: inset 0 0 4px rgba(0,0,0,0.2);
        }

        @keyframes pulse-orange {
            0% { box-shadow: 0 0 6px #ff9500; }
            50% { box-shadow: 0 0 14px #ff9500; }
            100% { box-shadow: 0 0 6px #ff9500; }
        }

        .upgrade-chance {
            font-size: 16px;
            font-weight: bold;
            margin: 10px 0;
            color: var(--tg-theme-button-color, #3390ec);
        }

        /* Стили Инвентаря */
        .inventory {
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            padding: 16px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .inventory h3 {
            margin: 0 0 12px 0;
            text-align: center;
        }

        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        .inventory-item {
            border-radius: 8px;
            padding: 8px;
            text-align: center;
            font-size: 28px;
            position: relative;
            cursor: pointer;
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid rgba(0,0,0,0.05);
        }

        .inventory-item.selected-for-upgrade {
            border-color: #3390ec !important;
            transform: scale(0.95);
        }

        .inventory-item .sell-button {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            font-size: 8px;
            padding: 2px 0;
            border-radius: 0 0 6px 6px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .inventory-item:hover .sell-button {
            opacity: 1;
        }

        /* Кнопки действий */
        .action-button {
            width: 100%;
            background: var(--tg-theme-button-color, #3390ec);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        .action-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .credit-button {
            display: none;
            margin: 10px auto 0 auto;
            background: #ff3b30;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
        }

        /* Результаты */
        .result {
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
            text-align: center;
            font-weight: bold;
            display: none;
        }
        .win { color: #34c759; }
        .lose { color: #ff3b30; }

        /* Рулетка анимации кейсов */
        .case-opening-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .case-items-container {
            display: flex;
            width: 320px;
            height: 100px;
            position: relative;
            overflow: hidden;
            background: #1a1a1a;
            border-radius: 10px;
        }

        .case-items-wrapper {
            display: flex;
            position: absolute;
            left: 0;
        }

        .case-item-animation {
            min-width: 100px;
            height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            flex-shrink: 0;
            border-radius: 8px;
            margin: 0 2px;
        }

        .case-selector {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 100%;
            border: 3px solid #3390ec;
            box-sizing: border-box;
            pointer-events: none;
            z-index: 2;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('cases-page')">📦 Кейсы</button>
            <button class="tab-btn" onclick="switchTab('upgrade-page')">⚡ Апгрейд</button>
        </div>

        <div class="balance">
            <div>Ваш баланс:</div>
            <div class="balance-amount" id="globalBalance">10000 руб.</div>
            <button class="credit-button" id="creditButton">Взять бонус (1000 руб.)</button>
        </div>

        <div id="cases-page" class="page active">
            <div class="cases-container">
                <div class="case-item" data-case="flea" data-price="100">
                    <div class="case-image">🛖</div>
                    <div class="case-name">Барахолка</div>
                    <div class="case-price">100 руб.</div>
                </div>
                <div class="case-item" data-case="market" data-price="500">
                    <div class="case-image">🏪</div>
                    <div class="case-name">Маркетплейс</div>
                    <div class="case-price">500 руб.</div>
                </div>
                <div class="case-item" data-case="cars" data-price="2500">
                    <div class="case-image">🏎️</div>
                    <div class="case-name">Автосалон</div>
                    <div class="case-price">2500 руб.</div>
                </div>
                <div class="case-item" data-case="elite" data-price="10000">
                    <div class="case-image">👑</div>
                    <div class="case-name">Элита</div>
                    <div class="case-price">10000 руб.</div>
                </div>
            </div>
            <button class="action-button" id="openCaseButton" disabled>Выберите кейс</button>
        </div>

        <div id="upgrade-page" class="page">
            <div class="upgrade-zone">
                <div class="upgrade-slots">
                    <div class="upgrade-slot" id="slot-input">❓</div>
                    <div style="font-size: 24px;">➡️</div>
                    <div class="upgrade-slot" id="slot-output">❓</div>
                </div>
                
                <div class="upgrade-prices">
                    <span id="price-input-label">Текущая цена: 0 руб.</span>
                    <span id="price-output-label">При успехе: 0 руб.</span>
                </div>

                <div class="rarity-timeline">
                    <div class="timeline-step" id="step-common">Обыч.</div>
                    <div class="timeline-step" id="step-uncommon">Необ.</div>
                    <div class="timeline-step" id="step-rare">Редк.</div>
                    <div class="timeline-step" id="step-epic">Миф.</div>
                    <div class="timeline-step" id="step-legendary">Лег.</div>
                </div>

                <div class="upgrade-chance" id="upgradeChance">Шанс успеха: 0%</div>
            </div>
            <button class="action-button" id="upgradeButton" disabled>Улучшить предмет</button>
        </div>

        <div class="inventory">
            <h3>Ваш Инвентарь</h3>
            <div class="inventory-grid" id="inventoryGrid"></div>
        </div>

        <div class="result" id="resultNotice"></div>

        <div class="case-opening-animation" id="caseOpeningAnimation">
            <div class="case-items-container" id="caseItemsContainer"></div>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        let selectedCase = null;
        let inventory = [];
        let currentBalance = 10000;
        let upgradeIndex = null;

        // Порядковая матрица качеств и их коэффициентов стоимости
        const QUALITY_ORDER = ['common', 'uncommon', 'rare', 'epic', 'legendary'];
        const QUALITY_MULTIPLIERS = { common: 1, uncommon: 2, rare: 5, epic: 10, legendary: 25 };

        // Базовые предметы по категориям кейсов
        const CASE_POOLS = {
            flea: [
                { name: 'Носки', emoji: '🧦', baseValue: 30 },
                { name: 'Провод', emoji: '🔌', baseValue: 50 },
                { name: 'Старое радио', emoji: '📻', baseValue: 70 },
                { name: 'Телевизор', emoji: '📺', baseValue: 120 },
                { name: 'Приставка', emoji: '🕹', baseValue: 200 }
            ],
            market: [
                { name: 'Кроссовки', emoji: '👟', baseValue: 250 },
                { name: 'Наушники', emoji: '🎧', baseValue: 350 },
                { name: 'Смарт-часы', emoji: '⌚', baseValue: 500 },
                { name: 'Телефон', emoji: '📱', baseValue: 750 },
                { name: 'Ноутбук', emoji: '💻', baseValue: 1200 }
            ],
            cars: [
                { name: 'Скутер', emoji: '🛵', baseValue: 1500 },
                { name: 'Мотоцикл', emoji: '🏍', baseValue: 2500 },
                { name: 'Б/У Седан', emoji: '🚗', baseValue: 4000 },
                { name: 'Внедорожник', emoji: '🚙', baseValue: 6500 },
                { name: 'Спорткар', emoji: '🏎', baseValue: 11000 }
            ],
            elite: [
                { name: 'Алмаз', emoji: '💎', baseValue: 15000 },
                { name: 'Яхта', emoji: '🛥', baseValue: 25000 },
                { name: 'Пентхаус', emoji: '🏢', baseValue: 45000 },
                { name: 'Замок', emoji: '🏰', baseValue: 80000 },
                { name: 'Корона', emoji: '👑', baseValue: 150000 }
            ]
        };

        if (tg) {
            tg.enableClosingConfirmation();
            tg.expand();
            if(localStorage.getItem('casino_balance_rub')) currentBalance = parseInt(localStorage.getItem('casino_balance_rub'));
            if(localStorage.getItem('casino_inventory_rub')) {
                try { inventory = JSON.parse(localStorage.getItem('casino_inventory_rub')); } catch(e) { inventory = []; }
            }
            updateBalance(currentBalance);
            updateInventory();
        }

        function switchTab(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            event.currentTarget.classList.add('active');
            resetUpgrade();
            updateInventory();
            document.getElementById('resultNotice').style.display = 'none';
        }

        function updateBalance(newBalance) {
            currentBalance = newBalance;
            localStorage.setItem('casino_balance_rub', currentBalance);
            document.getElementById('globalBalance').textContent = currentBalance + ' руб.';
            document.getElementById('creditButton').style.display = currentBalance <= 0 ? 'block' : 'none';
        }

        function updateInventory() {
            localStorage.setItem('casino_inventory_rub', JSON.stringify(inventory));
            const grid = document.getElementById('inventoryGrid');
            grid.innerHTML = '';
            
            if (inventory.length === 0) {
                grid.innerHTML = '<div style="grid-column: 1 / -1; text-align: center; color: var(--tg-theme-hint-color,#999999);">Инвентарь пуст</div>';
                return;
            }
            
            inventory.forEach((item, index) => {
                const el = document.createElement('div');
                el.className = `inventory-item q-${item.quality}`;
                if(index === upgradeIndex) el.classList.add('selected-for-upgrade');
                el.textContent = item.emoji;
                
                const totalPrice = item.baseValue * QUALITY_MULTIPLIERS[item.quality];
                
                const sellBtn = document.createElement('div');
                sellBtn.className = 'sell-button';
                sellBtn.textContent = `${totalPrice}р.`;
                sellBtn.onclick = (e) => {
                    e.stopPropagation();
                    sellItem(index);
                };
                
                el.appendChild(sellBtn);
                el.onclick = () => {
                    if(document.getElementById('upgrade-page').classList.contains('active')) {
                        selectForUpgrade(index);
                    }
                };
                grid.appendChild(el);
            });
        }

        function sellItem(index) {
            if(index === upgradeIndex) resetUpgrade();
            const reward = inventory[index].baseValue * QUALITY_MULTIPLIERS[inventory[index].quality];
            inventory.splice(index, 1);
            updateInventory();
            updateBalance(currentBalance + reward);
            showNotice(`Продано за ${reward} руб.!`, true);
        }

        /* --- ЛОГИКА КЕЙСОВ --- */
        document.querySelectorAll('.case-item').forEach(item => {
            item.addEventListener('click', function() {
                selectedCase = this.dataset.case;
                const price = this.dataset.price;
                document.getElementById('openCaseButton').disabled = false;
                document.getElementById('openCaseButton').textContent = `Открыть за ${price} руб.`;
                document.querySelectorAll('.case-item').forEach(c => c.style.borderColor = 'transparent');
                this.style.borderColor = 'var(--tg-theme-button-color, #3390ec)';
            });
        });

        document.getElementById('openCaseButton').addEventListener('click', () => {
            if (!selectedCase) return;
            const price = parseInt(selectedCase === 'flea' ? 100 : selectedCase === 'market' ? 500 : selectedCase === 'cars' ? 2500 : 10000);
            
            if (currentBalance < price) {
                showNotice('Недостаточно баланса!', false);
                return;
            }
            
            document.getElementById('openCaseButton').disabled = true;
            
            const pool = CASE_POOLS[selectedCase];
            const baseItem = pool[Math.floor(Math.random() * pool.length)];
            
            // Расчет качества при выпадении (Шансы: Common 50%, Uncommon 25%, Rare 15%, Epic 8%, Legendary 2%)
            const roll = Math.random() * 100;
            let quality = 'common';
            if (roll > 50 && roll <= 75) quality = 'uncommon';
            else if (roll > 75 && roll <= 90) quality = 'rare';
            else if (roll > 90 && roll <= 98) quality = 'epic';
            else if (roll > 98) quality = 'legendary';

            const wonItem = { ...baseItem, quality: quality };
            
            const animContainer = document.getElementById('caseOpeningAnimation');
            const wrapperContainer = document.getElementById('caseItemsContainer');
            wrapperContainer.innerHTML = '<div class="case-items-wrapper" id="animWrapper"></div><div class="case-selector"></div>';
            const wrapper = document.getElementById('animWrapper');
            
            // Генерация ленты рулетки
            const allItemsFlattened = Object.values(CASE_POOLS).flat();
            for (let i = 0; i < 30; i++) {
                const randItem = allItemsFlattened[Math.floor(Math.random() * allItemsFlattened.length)];
                const randQual = QUALITY_ORDER[Math.floor(Math.random() * QUALITY_ORDER.length)];
                const d = document.createElement('div');
                d.className = `case-item-animation q-${i === 25 ? wonItem.quality : randQual}`;
                d.textContent = i === 25 ? wonItem.emoji : randItem.emoji;
                wrapper.appendChild(d);
            }
            
            animContainer.style.display = 'flex';
            wrapper.style.transform = 'translateX(0px)';
            void wrapper.offsetWidth;
            
            wrapper.style.transition = 'transform 3.5s cubic-bezier(0.15, 0.85, 0.35, 1)';
            wrapper.style.transform = 'translateX(-2600px)'; // точный сдвиг под 25-й элемент с учетом марджинов
            
            setTimeout(() => {
                animContainer.style.display = 'none';
                updateBalance(currentBalance - price);
                inventory.push(wonItem);
                updateInventory();
                
                const qualNames = { common: 'Обычный', uncommon: 'Необычный', rare: 'Редкий', epic: 'Мифический', legendary: 'Легендарный' };
                showNotice(`Выпало: ${wonItem.name} [${qualNames[wonItem.quality]}]`, true);
                document.getElementById('openCaseButton').disabled = false;
            }, 3600);
        });

        /* --- ЛОГИКА АПГРЕЙДА --- */
        function selectForUpgrade(index) {
            upgradeIndex = index;
            const item = inventory[index];
            
            const currentQualityIndex = QUALITY_ORDER.indexOf(item.quality);
            const nextQuality = QUALITY_ORDER[currentQualityIndex + 1];
            
            // Подсветка текущего уровня на шкале
            document.querySelectorAll('.timeline-step').forEach(s => s.className = 'timeline-step');
            document.getElementById(`step-${item.quality}`).classList.add(`q-${item.quality}`, 'active');

            const curPrice = item.baseValue * QUALITY_MULTIPLIERS[item.quality];
            document.getElementById('price-input-label').textContent = `Текущая цена: ${curPrice} руб.`;

            const slotIn = document.getElementById('slot-input');
            slotIn.className = `upgrade-slot q-${item.quality}`;
            slotIn.textContent = item.emoji;

            if(!nextQuality) {
                // Максимальный уровень
                document.getElementById('price-output-label').textContent = `Максимум достигнут`;
                document.getElementById('slot-output').className = 'upgrade-slot';
                document.getElementById('slot-output').textContent = '👑';
                document.getElementById('upgradeChance').textContent = `Шанс успеха: 0%`;
                document.getElementById('upgradeButton').disabled = true;
                updateInventory();
                return;
            }

            const nextPrice = item.baseValue * QUALITY_MULTIPLIERS[nextQuality];
            document.getElementById('price-output-label').textContent = `При успехе: ${nextPrice} руб.`;

            const slotOut = document.getElementById('slot-output');
            slotOut.className = `upgrade-slot q-${nextQuality}`;
            slotOut.textContent = item.emoji;

            // Расчет шансов для каждого перехода
            const chances = { common: 75, uncommon: 55, rare: 35, epic: 15 };
            const currentChance = chances[item.quality] || 50;
            
            document.getElementById('upgradeChance').textContent = `Шанс успеха: ${currentChance}%`;
            
            const upBtn = document.getElementById('upgradeButton');
            upBtn.disabled = false;
            updateInventory();
        }

        function resetUpgrade() {
            upgradeIndex = null;
            const slotIn = document.getElementById('slot-input');
            const slotOut = document.getElementById('slot-output');
            
            slotIn.className = 'upgrade-slot';
            slotIn.textContent = '❓';
            slotOut.className = 'upgrade-slot';
            slotOut.textContent = '❓';
            
            document.getElementById('price-input-label').textContent = 'Текущая цена: 0 руб.';
            document.getElementById('price-output-label').textContent = 'При успехе: 0 руб.';
            document.getElementById('upgradeChance').textContent = 'Шанс успеха: 0%';
            document.getElementById('upgradeButton').disabled = true;
            
            document.querySelectorAll('.timeline-step').forEach(s => s.className = 'timeline-step');
        }

        document.getElementById('upgradeButton').addEventListener('click', () => {
            if (upgradeIndex === null) return;
            
            const item = inventory[upgradeIndex];
            const currentQualityIndex = QUALITY_ORDER.indexOf(item.quality);
            const nextQuality = QUALITY_ORDER[currentQualityIndex + 1];
            
            if(!nextQuality) return;

            const chances = { common: 75, uncommon: 55, rare: 35, epic: 15 };
            const currentChance = chances[item.quality] || 50;
            const roll = Math.random() * 100;
            
            if (roll <= currentChance) {
                // Успех
                inventory[upgradeIndex].quality = nextQuality;
                showNotice(`Успешный апгрейд качества до ${nextQuality}!`, true);
            } else {
                // Сгорел
                inventory.splice(upgradeIndex, 1);
                showNotice(`Предмет сломался при попытке улучшения.`, false);
            }
            
            resetUpgrade();
            updateInventory();
        });

        /* --- ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ --- */
        function showNotice(msg, isWin) {
            const el = document.getElementById('resultNotice');
            el.textContent = msg;
            el.className = `result ${isWin ? 'win' : 'lose'}`;
            el.style.display = 'block';
            setTimeout(() => { el.style.display = 'none'; }, 4000);
        }

        document.getElementById('creditButton').addEventListener('click', () => {
            if(currentBalance <= 0) {
                updateBalance(1000);
                resetUpgrade();
                updateInventory();
                showNotice('Вам начислен антикризисный бонус 1000 руб.!', true);
            }
        });
    </script>
</body>
</html>
